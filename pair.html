<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OSHIYA-MD | ULTIMATE PREMIUM HUB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary-glow: #00d2ff;
  --secondary-glow: #3a7bd5;
  --bg-dark: #020202;
  --glass: rgba(255, 255, 255, 0.05);
  --accent: #ff00cc;
  --neon-blue: #00f2ff;
  --wa-green: #25d366;
  --premium-gradient: linear-gradient(135deg, #ff00cc, #3333ff, #00f2ff);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* --- PREMIUM PRELOADER --- */
#preloader {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 10000;
  transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.loader-content { text-align: center; position: relative; }

.loader-logo {
  font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900;
  color: #fff; letter-spacing: 15px; margin-bottom: 20px;
  text-shadow: 0 0 20px var(--accent);
  animation: logoGlitch 2s infinite;
}

@keyframes logoGlitch {
  0% { transform: skew(0deg); text-shadow: 2px 0 var(--neon-blue), -2px 0 var(--accent); }
  20% { transform: skew(2deg); }
  21% { transform: skew(-10deg); }
  22% { transform: skew(0deg); }
  100% { transform: skew(0deg); text-shadow: 5px 0 var(--neon-blue), -5px 0 var(--accent); }
}

.loading-bar-container {
  width: 250px; height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 10px; overflow: hidden; position: relative;
}

.loading-bar-fill {
  width: 0%; height: 100%; background: var(--premium-gradient);
  box-shadow: 0 0 15px var(--neon-blue);
  animation: fillProgress 2.5s ease-in-out forwards;
}

@keyframes fillProgress { 0% { width: 0%; } 100% { width: 100%; } }

.loading-text {
  margin-top: 15px; font-family: 'Orbitron'; font-size: 10px;
  letter-spacing: 4px; color: var(--neon-blue); text-transform: uppercase;
  animation: pulse 1.5s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* --- BACKGROUND --- */
.bg-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
  z-index: -1;
}

.stars {
  position: absolute; width: 100%; height: 100%;
  background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
  animation: moveStars 120s linear infinite; opacity: 0.4;
}

@keyframes moveStars { from { background-position: 0 0; } to { background-position: 10000px 5000px; } }

/* --- MAIN CONTAINER --- */
.container {
  width: 92%; max-width: 460px;
  background: rgba(15, 15, 15, 0.7);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 40px; padding: 45px 30px;
  box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
  text-align: center; margin-top: 60px; position: relative;
}

.container::before {
  content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: var(--premium-gradient); border-radius: 42px;
  z-index: -1; opacity: 0.3;
}

.inner-card { background: #000; border-radius: 35px; padding: 30px 20px; }

.profile-area { width: 115px; height: 115px; margin: 0 auto 15px; }
.profile-area img { 
  width: 100%; height: 100%; border-radius: 50%; 
  border: 2px solid var(--neon-blue); padding: 5px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.title { 
  font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
  background: var(--premium-gradient); -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent;
}

.status-badge {
  display: inline-block; padding: 6px 16px; border-radius: 50px;
  background: rgba(0, 242, 255, 0.1); color: var(--neon-blue);
  font-size: 10px; font-weight: bold; margin: 15px 0 25px;
  border: 1px solid var(--neon-blue); letter-spacing: 1px;
}

/* --- SWITCHER --- */
.mode-switch {
  display: flex; background: rgba(255, 255, 255, 0.05); padding: 6px; 
  border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);
}
.mode-btn {
  flex: 1; padding: 12px; border: none; border-radius: 15px; 
  background: transparent; color: #888; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
}
.mode-btn.active { background: var(--premium-gradient); color: #fff; box-shadow: 0 0 15px rgba(255,0,204,0.4); }

/* --- INPUTS --- */
.input-field { 
  width: 100%; background: #0a0a0a; border: 1px solid #333; padding: 18px; 
  border-radius: 18px; color: #fff; font-size: 16px; margin-bottom: 20px; outline: none; text-align: center;
}
.input-field:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

.main-btn { 
  width: 100%; padding: 18px; border: none; border-radius: 18px; 
  background: var(--premium-gradient); color: #fff; font-weight: bold;
  font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
}

/* --- DISPLAY BOX --- */
.display-box {
  margin-top: 25px; padding: 25px; background: rgba(255,255,255,0.02); 
  border-radius: 25px; border: 1px dashed #444; min-height: 120px;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}

/* COPY CODE STYLE */
#pairOutput span {
  cursor: pointer; transition: 0.3s; padding: 5px 15px; border-radius: 10px;
}
#pairOutput span:active { background: rgba(0, 242, 255, 0.2); transform: scale(0.9); }

/* --- FLOATING --- */
.floating-btns { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
.f-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; cursor: pointer; transition: 0.3s; }
.wa-btn { background: #25d366; }
.mu-btn { background: var(--accent); }

#loading { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 12px; }
</style>
</head>
<body>

<div id="preloader">
  <div class="loader-content">
    <div class="loader-logo">OSHIYA</div>
    <div class="loading-bar-container">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-text">Initializing Secure Server...</div>
  </div>
</div>

<div class="bg-canvas"><div class="stars"></div></div>

<div class="container">
  <div class="inner-card">
    <div class="profile-area">
      <img src="https://raw.githubusercontent.com/oshadha12345/images/refs/heads/main/20251222_040815.jpg" alt="OSHIYA">
    </div>
    <h1 class="title">OSHIYA PREMIUM</h1>
    <div class="status-badge"><i class="fas fa-crown"></i> VIP ACCESS GRANTED</div>

    <div class="mode-switch">
      <button class="mode-btn active" id="modePair" onclick="toggleMode('PAIR')">PAIRING CODE</button>
      <button class="mode-btn" id="modeQR" onclick="toggleMode('QR')">QR SCANNER</button>
    </div>

    <div id="pairSection">
      <input type="tel" id="numberInput" class="input-field" placeholder="94756xxxxxxx">
      <button class="main-btn" id="genPairBtn"><i class="fas fa-bolt"></i> GENERATE CODE</button>
    </div>

    <div id="qrSection" style="display: none;">
      <button class="main-btn" id="genQRBtn"><i class="fas fa-qrcode"></i> GET MASTER QR</button>
    </div>

    <div class="display-box" id="resultBox">
       <div id="loading" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i> ENCRYPTING...</div>
       <div id="qrOutput" style="display:none;" class="qr-frame"></div>
       <div id="pairOutput" style="display:none;">
          <p style="font-size: 10px; color: #666; margin-bottom: 10px;">TAP CODE TO COPY</p>
          <span id="copyCode" onclick="copyToClipboard()" style="color: var(--neon-blue); font-size: 32px; font-weight: 900; letter-spacing: 5px; font-family: 'Orbitron'; text-shadow: 0 0 15px var(--neon-blue);">--------</span>
       </div>
       <div id="placeholderText" style="color: #444; font-size: 11px; font-family: 'Orbitron';">READY FOR LINKING</div>
    </div>
  </div>
</div>

<div class="floating-btns">
  <div class="f-btn mu-btn" id="musicToggle"><i class="fas fa-music"></i></div>
  <a href="https://wa.me/+94756599952" target="_blank" class="f-btn wa-btn"><i class="fab fa-whatsapp"></i></a>
</div>

<audio id="bgMusic" loop src="https://github.com/oshadha12345/images/raw/refs/heads/main/Voice/Voce%20na%20mira%20(slowed_tiktok%20vers.)%20-%20hwungii_%20dj%20vjk1%20%5Bedit%20audio%5D(MP3_160K).mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
<script>
// --- PAGE LOAD ---
window.onload = () => {
    setTimeout(() => {
        const loader = document.getElementById('preloader');
        loader.style.opacity = '0';
        loader.style.transform = 'translateY(-100%)';
        setTimeout(() => loader.style.display = 'none', 1000);
    }, 2800); // 2.8 seconds for smooth premium feel
};

// --- COPY FUNCTION ---
function copyToClipboard() {
    const codeText = document.getElementById('copyCode').innerText;
    if(codeText === "--------") return;
    
    navigator.clipboard.writeText(codeText).then(() => {
        const span = document.getElementById('copyCode');
        const originalColor = span.style.color;
        span.innerText = "COPIED!";
        span.style.color = "#25d366";
        
        setTimeout(() => {
            span.innerText = codeText;
            span.style.color = originalColor;
        }, 1500);
    });
}

// --- LOGIC ---
function toggleMode(mode) {
    const isPair = mode === 'PAIR';
    document.getElementById('modePair').classList.toggle('active', isPair);
    document.getElementById('modeQR').classList.toggle('active', !isPair);
    document.getElementById('pairSection').style.display = isPair ? 'block' : 'none';
    document.getElementById('qrSection').style.display = isPair ? 'none' : 'block';
    resetDisplay();
}

function resetDisplay() {
    document.getElementById('qrOutput').style.display = 'none';
    document.getElementById('pairOutput').style.display = 'none';
    document.getElementById('placeholderText').style.display = 'block';
}

document.getElementById('genPairBtn').onclick = async () => {
    const num = document.getElementById('numberInput').value.replace(/[^0-9]/g,"");
    if(!num) return alert("Enter Number!");

    showLoading();
    try {
        const res = await axios.get(`/pair?number=${num}`);
        document.getElementById('copyCode').innerText = res.data.code;
        document.getElementById('pairOutput').style.display = 'block';
    } catch (e) {
        alert("Server Error!");
        document.getElementById('placeholderText').style.display = 'block';
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
};

document.getElementById('genQRBtn').onclick = async () => {
    showLoading();
    try {
        const res = await axios.get('/qr');
        document.getElementById('qrOutput').innerHTML = `<img src="${res.data.qr}" width="180" style="border-radius:10px;">`;
        document.getElementById('qrOutput').style.display = 'block';
    } catch (e) {
        alert("Error!");
        document.getElementById('placeholderText').style.display = 'block';
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
};

function showLoading() {
    document.getElementById('placeholderText').style.display = 'none';
    document.getElementById('qrOutput').style.display = 'none';
    document.getElementById('pairOutput').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
}

// Music Logic
const mBtn = document.getElementById('musicToggle');
const audio = document.getElementById('bgMusic');
mBtn.onclick = () => {
    if(audio.paused) { audio.play(); mBtn.style.boxShadow = "0 0 20px #ff00cc"; }
    else { audio.pause(); mBtn.style.boxShadow = "none"; }
};
</script>

</body>
  </html>
